name: Okinawa Nationwide Integration

on:
  push:
    branches:
      - agent/okinawa-midterm-indicator-review
    paths:
      - .github/workflows/okinawa_indicator_audit.yml
      - scripts/integrate_okinawa_nationwide.py

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/okinawa-midterm-indicator-review
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Synchronize branch
        run: git pull --rebase origin agent/okinawa-midterm-indicator-review
      - name: Integrate nationwide publication
        run: python scripts/integrate_okinawa_nationwide.py
      - name: Commit nationwide integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/web/components/CoverageExplorer.tsx \
            apps/web/app/municipalities/page.tsx \
            apps/web/app/sitemap.ts \
            scripts/validate_static_export.py \
            scripts/check_production.sh
          git commit -m "Integrate Okinawa reviewed indicators nationwide"
          git push origin HEAD:agent/okinawa-midterm-indicator-review
