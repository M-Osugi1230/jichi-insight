name: Okinawa Phase 8 Completion

on:
  push:
    branches:
      - agent/okinawa-midterm-indicator-review
    paths:
      - .github/workflows/okinawa_indicator_audit.yml
      - scripts/complete_phase8_with_okinawa.py

permissions:
  contents: write

jobs:
  complete-phase8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/okinawa-midterm-indicator-review
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Synchronize branch
        run: git pull --rebase origin agent/okinawa-midterm-indicator-review
      - name: Update canonical registries
        run: python scripts/complete_phase8_with_okinawa.py
      - name: Commit Phase 8 completion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/catalog/regional_anchor_source_registry.json \
            data/catalog/published_prefecture_pages.json \
            data/catalog/phase7_completion.json \
            data/catalog/phase8_completion.json \
            data/catalog/phase9_completion.json \
            data/catalog/wave1_policy_review_queue.json
          git commit -m "Complete Phase 8 regional anchor expansion"
          git push origin HEAD:agent/okinawa-midterm-indicator-review
