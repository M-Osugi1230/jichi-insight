name: Fix Phase 9 static validator

on:
  push:
    branches:
      - agent/phase9-full-review
    paths:
      - .github/workflows/fix-phase9-static-validator.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase9-full-review
      - name: Initialize Phase 9 page requirements safely
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/validate_static_export.py")
          text = path.read_text(encoding="utf-8")
          old = 'requirements["municipalities/phase9/index.html"].extend('
          new = 'requirements.setdefault("municipalities/phase9/index.html", []).extend('
          if text.count(old) != 1:
              raise SystemExit(f"Expected one static-validator target, found {text.count(old)}")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
      - name: Commit validator correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/validate_static_export.py
          git commit -m "Initialize Phase 9 static export requirements"
          git push origin HEAD:agent/phase9-full-review
