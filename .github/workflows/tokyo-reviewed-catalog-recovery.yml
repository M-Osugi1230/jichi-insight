name: Tokyo Reviewed Catalog Recovery

on:
  pull_request:
    paths:
      - ".github/workflows/tokyo-reviewed-catalog-recovery.yml"

permissions:
  contents: write

jobs:
  recover:
    name: Recover generated Tokyo reviewed catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install extraction dependency
        run: python -m pip install "PyMuPDF>=1.24,<2"

      - name: Recover generator and official source
        run: |
          set -euo pipefail
          mkdir -p .tmp/tokyo
          git show d5f6f85c1a5276e65dc62e770c8da94e1fe9e372:scripts/build_tokyo_policy_target_completion.py.gz.b64 \
            > .tmp/tokyo/generator.py.gz.b64
          curl --fail --location --retry 4 --retry-delay 3 \
            "https://www.seisakukikaku.metro.tokyo.lg.jp/documents/d/seisakukikaku/2050tokyo-seisakumokuhyo2026" \
            --output .tmp/tokyo/tokyo-policy-targets-2026.pdf
          python - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          encoded = Path(".tmp/tokyo/generator.py.gz.b64").read_bytes()
          Path(".tmp/tokyo/build_completion.py").write_bytes(
              gzip.decompress(base64.b64decode(encoded))
          )
          PY
          python .tmp/tokyo/build_completion.py \
            --pdf .tmp/tokyo/tokyo-policy-targets-2026.pdf \
            --repo-root .

      - name: Verify recovered reviewed catalog
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/reviewed/tokyo_policy_target_cards.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          assert len(data["items"]) == 304
          assert {item["source_page"] for item in data["items"]} == set(range(1, 61))
          assert len({item["id"] for item in data["items"]}) == 304
          PY

      - name: Commit recovered canonical data
        run: |
          set -euo pipefail
          rm -rf .tmp
          rm -f .github/workflows/tokyo-reviewed-catalog-recovery.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/reviewed/tokyo_policy_target_cards.json
          git add -A
          git commit -m "Add complete Tokyo reviewed target catalog"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
