name: Build Phase 9 reviewed targets macOS

on:
  pull_request:
    paths:
      - scripts/audit_phase9_numeric_target_sources.py
      - scripts/build_phase9_reviewed_target_statements.py
      - scripts/build_phase9_reviewed_target_statements_parallel.py
      - scripts/finalize_phase9_publication.py
      - data/catalog/phase9_*_source_registry.json
      - schemas/phase9_*.schema.json
      - pyproject.toml
      - .github/workflows/build-phase9-reviewed-target-statements-macos.yml
  push:
    branches:
      - agent/phase9-full-review
    paths:
      - scripts/audit_phase9_numeric_target_sources.py
      - scripts/build_phase9_reviewed_target_statements.py
      - scripts/build_phase9_reviewed_target_statements_parallel.py
      - scripts/finalize_phase9_publication.py
      - data/catalog/phase9_*_source_registry.json
      - schemas/phase9_*.schema.json
      - pyproject.toml
      - .github/workflows/build-phase9-reviewed-target-statements-macos.yml

permissions:
  contents: write

concurrency:
  group: phase9-reviewed-target-build-macos-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase9-full-review
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install extraction dependencies
        run: python -m pip install -e .
      - name: Build Evidence-backed target statements
        run: |
          set -o pipefail
          python scripts/build_phase9_reviewed_target_statements_parallel.py --workers 8 2>&1 | tee phase9-builder-macos.log
      - name: Finalize nationwide canonical registries
        run: python scripts/finalize_phase9_publication.py
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase9-reviewed-target-builder-macos-diagnostics
          path: phase9-builder-macos.log
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload generated review data
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: phase9-reviewed-target-statements-macos
          path: |
            data/reviewed/phase9
            data/evidence/phase9
            data/catalog/phase9_review_summary.json
            data/catalog/phase9_plan_history.json
            data/catalog/phase9_execution_queue.json
            data/catalog/phase9_completion.json
            data/catalog/prefecture_coverage.json
            data/catalog/published_prefecture_pages.json
            data/catalog/nationwide_source_inventory.json
            data/catalog/phase7_completion.json
          retention-days: 14
      - name: Validate generated JSON
        run: python scripts/validate_repository.py
      - name: Commit generated review data
        run: |
          set -euo pipefail
          branch="agent/phase9-full-review"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/reviewed/phase9 \
            data/evidence/phase9 \
            data/catalog/phase9_review_summary.json \
            data/catalog/phase9_plan_history.json \
            data/catalog/phase9_execution_queue.json \
            data/catalog/phase9_completion.json \
            data/catalog/prefecture_coverage.json \
            data/catalog/published_prefecture_pages.json \
            data/catalog/nationwide_source_inventory.json \
            data/catalog/phase7_completion.json
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "Materialize Phase 9 reviewed target statements"
          for attempt in 1 2 3; do
            git fetch origin "$branch"
            git rebase "origin/$branch"
            if git push origin "HEAD:$branch"; then
              exit 0
            fi
            echo "Generated-data push attempt $attempt failed; retrying"
            sleep $((attempt * 5))
          done
          echo "Unable to push generated Phase 9 data after three attempts" >&2
          exit 1
