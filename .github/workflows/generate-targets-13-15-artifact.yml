name: Generate targets 13 to 15 artifact

on:
  pull_request:
    branches:
      - main
    types:
      - reopened
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    if: github.head_ref == 'agent/fukuoka-targets-13-15'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fukuoka-targets-13-15
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate registry
        run: python scripts/register_targets_13_15.py
      - uses: actions/upload-artifact@v4
        with:
          name: policy-targets-13-15-registry
          path: apps/web/lib/policyTargets.ts
          if-no-files-found: error
          retention-days: 3
