name: Audit Phase 9 numeric-target sources

on:
  pull_request:
    paths:
      - scripts/audit_phase9_numeric_target_sources.py
      - data/catalog/phase9_*_source_registry.json
      - pyproject.toml
      - .github/workflows/audit-phase9-numeric-target-sources.yml
  push:
    branches:
      - agent/phase9-full-review
    paths:
      - scripts/audit_phase9_numeric_target_sources.py
      - data/catalog/phase9_*_source_registry.json
      - pyproject.toml
      - .github/workflows/audit-phase9-numeric-target-sources.yml

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install extraction dependencies
        run: python -m pip install -e .
      - name: Audit official numeric-target sources
        run: python scripts/audit_phase9_numeric_target_sources.py
      - name: Upload audit inventory
        uses: actions/upload-artifact@v4
        with:
          name: phase9-numeric-target-source-audit
          path: data/extracted/phase9_numeric_target_source_audit.json
          retention-days: 14
      - name: Commit audit inventory
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/extracted/phase9_numeric_target_source_audit.json
          if git diff --cached --quiet; then
            echo "No audit changes"
          else
            git commit -m "Materialize Phase 9 source audit"
            git push
          fi
