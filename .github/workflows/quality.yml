name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - agent/kagawa-extended-plan-indicators

permissions:
  contents: write

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kagawa-materialize:
    name: Materialize Kagawa canonical data
    if: (github.event_name == 'pull_request' && github.head_ref == 'agent/kagawa-extended-plan-indicators') || (github.event_name == 'push' && github.ref_name == 'agent/kagawa-extended-plan-indicators')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/kagawa-extended-plan-indicators
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check whether generation is required
        id: required
        run: |
          if [[ -f data/catalog/kagawa_extended_plan_indicator_review_manifest.json ]]; then
            echo "generate=false" >> "$GITHUB_OUTPUT"
          else
            echo "generate=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install extraction dependency
        if: steps.required.outputs.generate == 'true'
        run: python -m pip install pdfplumber==0.11.9
      - name: Download official revision PDF
        if: steps.required.outputs.generate == 'true'
        run: |
          curl --fail --location --retry 4 --output /tmp/kagawa.pdf \
            https://www.pref.kagawa.lg.jp/documents/36520/shiryou3_shihyouminaoshi.pdf
          test "$(stat -c%s /tmp/kagawa.pdf)" -gt 100000
      - name: Generate canonical catalog
        if: steps.required.outputs.generate == 'true'
        run: python scripts/build_kagawa_indicator_catalog.py /tmp/kagawa.pdf
      - name: Commit canonical data
        if: steps.required.outputs.generate == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/reviewed/kagawa_extended_plan_indicators_part*.json \
            data/reviewed/kagawa_extended_plan_indicator_occurrences.json \
            data/evidence/kagawa_extended_plan_indicator_evidence_part*.json \
            data/catalog/kagawa_extended_plan_indicator_review_manifest.json
          git commit -m "Generate Kagawa extended-plan indicator catalog"
          git push origin HEAD:agent/kagawa-extended-plan-indicators

  repository:
    name: Repository and data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python validation tools
        run: python -m pip install -e ".[dev]"

      - name: Validate repository
        run: |
          set -o pipefail
          python scripts/validate_repository.py 2>&1 | tee repository-validation.log

      - name: Upload repository validation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: repository-validation-diagnostics
          path: repository-validation.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Test
        run: |
          set -o pipefail
          pytest -vv 2>&1 | tee pytest.log

      - name: Upload pytest diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: pytest.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Lint Python
        run: |
          set -o pipefail
          ruff check scripts tests 2>&1 | tee ruff.log

      - name: Upload Python lint diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: python-lint-diagnostics
          path: ruff.log
          if-no-files-found: ignore
          retention-days: 7

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: |
          set +e
          pnpm build > build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 200 build.log > build-error.log
            cat build-error.log
            exit "$status"
          fi
          cat build.log

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-build-diagnostics
          path: build-error.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Validate static export
        run: |
          set -o pipefail
          python scripts/validate_static_export.py 2>&1 | tee static-export.log

      - name: Upload static-export diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: static-export-diagnostics
          path: static-export.log
          if-no-files-found: ignore
          retention-days: 7
