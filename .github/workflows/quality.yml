name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - agent/okinawa-midterm-indicators

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  okinawa-inspect:
    name: Inspect Okinawa indicator annex
    if: github.event_name == 'push' && github.ref_name == 'agent/okinawa-midterm-indicators'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install extraction dependency
        run: python -m pip install pdfplumber==0.11.9
      - name: Download official annex
        run: |
          curl --fail --location --retry 4 --output /tmp/okinawa.pdf \
            https://www.pref.okinawa.jp/_res/projects/default_project/_page_/001/034/436/7_tyukijisshikeikaku_r2.pdf
          test "$(stat -c%s /tmp/okinawa.pdf)" -gt 100000
      - name: Inspect tables
        run: |
          python - <<'PY' > okinawa-annex-inspection.txt
          import json
          import pdfplumber
          with pdfplumber.open('/tmp/okinawa.pdf') as pdf:
              print('pages', len(pdf.pages))
              for page_index, page in enumerate(pdf.pages):
                  tables = page.extract_tables()
                  print('PAGE', page_index + 1, 'tables', len(tables), 'rows', [len(t) for t in tables])
                  for table_index, table in enumerate(tables[:2]):
                      print('TABLE', table_index)
                      for row in table[:4]:
                          print(json.dumps(row, ensure_ascii=False))
          PY
          cat okinawa-annex-inspection.txt
      - name: Upload inspection
        uses: actions/upload-artifact@v4
        with:
          name: okinawa-annex-inspection
          path: okinawa-annex-inspection.txt
          retention-days: 7

  repository:
    name: Repository and data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python validation tools
        run: python -m pip install -e ".[dev]"
      - name: Validate repository
        run: |
          set -o pipefail
          python scripts/validate_repository.py 2>&1 | tee repository-validation.log
      - name: Upload repository validation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: repository-validation-diagnostics
          path: repository-validation.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Test
        run: |
          set -o pipefail
          pytest -vv 2>&1 | tee pytest.log
      - name: Upload pytest diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: pytest.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Lint Python
        run: |
          set -o pipefail
          ruff check scripts tests 2>&1 | tee ruff.log
      - name: Upload Python lint diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: python-lint-diagnostics
          path: ruff.log
          if-no-files-found: ignore
          retention-days: 7

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: |
          set +e
          pnpm build > build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 200 build.log > build-error.log
            cat build-error.log
            exit "$status"
          fi
          cat build.log
      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-build-diagnostics
          path: build-error.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Validate static export
        run: |
          set -o pipefail
          python scripts/validate_static_export.py 2>&1 | tee static-export.log
      - name: Upload static-export diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: static-export-diagnostics
          path: static-export.log
          if-no-files-found: ignore
          retention-days: 7
