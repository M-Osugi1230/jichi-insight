name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    name: Repository and data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python validation tools
        run: python -m pip install -e ".[dev]"

      - name: Validate repository
        run: |
          set -o pipefail
          python scripts/validate_repository.py 2>&1 | tee repository-validation.log

      - name: Upload repository validation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: repository-validation-diagnostics
          path: repository-validation.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Test
        run: |
          set -o pipefail
          pytest -vv 2>&1 | tee pytest.log

      - name: Upload pytest diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: pytest.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Lint Python
        run: ruff check scripts tests

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: |
          set +e
          pnpm build > build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 200 build.log > build-error.log
            cat build-error.log
            exit "$status"
          fi
          cat build.log

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-build-diagnostics
          path: build-error.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Validate static export
        run: |
          set -o pipefail
          python scripts/validate_static_export.py 2>&1 | tee static-export.log

      - name: Upload static-export diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: static-export-diagnostics
          path: static-export.log
          if-no-files-found: ignore
          retention-days: 7
