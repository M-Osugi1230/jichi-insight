name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  materialize:
    name: Update Miyagi static count
    if: github.head_ref == 'agent/miyagi-actuals-measure16'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/miyagi-actuals-measure16
          fetch-depth: 0

      - name: Replace the former annual-row count
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/validate_static_export.py")
          text = path.read_text(encoding="utf-8")
          old = "440件の実績推移を公開"
          new = "468件の実績推移を公開"
          if text.count(old) != 1:
              raise SystemExit(f"Expected one old count, found {text.count(old)}")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY

      - name: Commit the canonical static requirement
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/validate_static_export.py
          git commit -m "Advance Miyagi static actual count"
          git push origin HEAD:agent/miyagi-actuals-measure16

  repository:
    name: Repository and data
    needs: materialize
    if: always() && (needs.materialize.result == 'success' || needs.materialize.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python validation tools
        run: python -m pip install -e ".[dev]"

      - name: Validate repository
        run: |
          set -o pipefail
          python scripts/validate_repository.py 2>&1 | tee repository-validation.log

      - name: Upload repository validation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: repository-validation-diagnostics
          path: repository-validation.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Test
        run: |
          set -o pipefail
          pytest -vv 2>&1 | tee pytest.log

      - name: Upload pytest diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: pytest.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Lint Python
        run: |
          set -o pipefail
          ruff check scripts tests 2>&1 | tee ruff.log

      - name: Upload Python lint diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: python-lint-diagnostics
          path: ruff.log
          if-no-files-found: ignore
          retention-days: 7

  web:
    name: Web
    needs: materialize
    if: always() && (needs.materialize.result == 'success' || needs.materialize.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: |
          set +e
          pnpm build > build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 200 build.log > build-error.log
            cat build-error.log
            exit "$status"
          fi
          cat build.log

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-build-diagnostics
          path: build-error.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Validate static export
        run: |
          set -o pipefail
          python scripts/validate_static_export.py 2>&1 | tee static-export.log

      - name: Upload static-export diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: static-export-diagnostics
          path: static-export.log
          if-no-files-found: ignore
          retention-days: 7
