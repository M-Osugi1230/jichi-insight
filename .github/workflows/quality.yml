name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  materialize:
    name: Materialize Miyagi measure 17
    if: github.head_ref == 'agent/miyagi-actuals-measure17'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/miyagi-actuals-measure17
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python validation tools
        run: python -m pip install -e ".[dev]"

      - name: Apply measure 17 canonical state
        run: python scripts/apply_miyagi_measure17_actuals.py

      - name: Validate repository state
        run: python scripts/validate_repository.py

      - name: Test measure 17 state
        run: pytest tests/test_miyagi_kpi_actuals_measure17.py

      - name: Test Miyagi aggregate totals
        run: pytest tests/test_miyagi_catalog_totals.py

      - name: Test Wave 1 queue
        run: pytest tests/test_wave1_policy_review_queue.py

      - name: Test final Miyagi KPI batch
        run: pytest tests/test_miyagi_kpi_catalog_groups_114_128.py

      - name: Test reviewed sequence
        run: pytest tests/test_miyagi_kpi_catalog_groups_53_68.py

      - name: Lint changed Python
        run: |
          ruff check \
            scripts/apply_miyagi_measure17_actuals.py \
            tests/test_miyagi_kpi_actuals_measure17.py \
            tests/test_miyagi_catalog_totals.py \
            tests/test_wave1_policy_review_queue.py \
            tests/test_miyagi_kpi_catalog_groups_114_128.py \
            tests/test_miyagi_kpi_catalog_groups_53_68.py

      - name: Commit canonical state
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/entities/policy/miyagi_kpi_catalog_measure17.json \
            data/catalog/miyagi_policy_review_manifest.json \
            data/catalog/wave1_policy_review_queue.json \
            schemas/miyagi_policy_review_manifest.schema.json \
            apps/web/lib/miyagiActuals.ts \
            tests/test_miyagi_catalog_totals.py \
            tests/test_wave1_policy_review_queue.py \
            tests/test_miyagi_kpi_catalog_groups_114_128.py \
            tests/test_miyagi_kpi_catalog_groups_53_68.py \
            scripts/validate_static_export.py
          if git diff --cached --quiet; then
            echo "Measure 17 canonical state is already current"
            exit 0
          fi
          git commit -m "Materialize Miyagi measure 17 actual linkage"
          git push origin HEAD:agent/miyagi-actuals-measure17

  repository:
    name: Repository and data
    needs: materialize
    if: always() && (needs.materialize.result == 'success' || needs.materialize.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python validation tools
        run: python -m pip install -e ".[dev]"

      - name: Validate repository
        run: |
          set -o pipefail
          python scripts/validate_repository.py 2>&1 | tee repository-validation.log

      - name: Upload repository validation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: repository-validation-diagnostics
          path: repository-validation.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Test
        run: |
          set -o pipefail
          pytest -vv 2>&1 | tee pytest.log

      - name: Upload pytest diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: pytest.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Lint Python
        run: |
          set -o pipefail
          ruff check scripts tests 2>&1 | tee ruff.log

      - name: Upload Python lint diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: python-lint-diagnostics
          path: ruff.log
          if-no-files-found: ignore
          retention-days: 7

  web:
    name: Web
    needs: materialize
    if: always() && (needs.materialize.result == 'success' || needs.materialize.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: |
          set +e
          pnpm build > build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 200 build.log > build-error.log
            cat build-error.log
            exit "$status"
          fi
          cat build.log

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-build-diagnostics
          path: build-error.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Validate static export
        run: |
          set -o pipefail
          python scripts/validate_static_export.py 2>&1 | tee static-export.log

      - name: Upload static-export diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: static-export-diagnostics
          path: static-export.log
          if-no-files-found: ignore
          retention-days: 7
