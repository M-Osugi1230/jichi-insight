name: Build Phase 9 reviewed target statements

on:
  pull_request:
    paths:
      - scripts/audit_phase9_numeric_target_sources.py
      - scripts/build_phase9_reviewed_target_statements.py
      - data/catalog/phase9_*_source_registry.json
      - pyproject.toml
      - .github/workflows/build-phase9-reviewed-target-statements.yml
  push:
    branches:
      - agent/phase9-full-review
    paths:
      - scripts/audit_phase9_numeric_target_sources.py
      - scripts/build_phase9_reviewed_target_statements.py
      - data/catalog/phase9_*_source_registry.json
      - pyproject.toml
      - .github/workflows/build-phase9-reviewed-target-statements.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install extraction dependencies
        run: python -m pip install -e .
      - name: Build Evidence-backed target statements
        run: python scripts/build_phase9_reviewed_target_statements.py
      - name: Validate generated JSON
        run: python scripts/validate_repository.py
      - name: Upload generated review data
        uses: actions/upload-artifact@v4
        with:
          name: phase9-reviewed-target-statements
          path: |
            data/reviewed/phase9
            data/evidence/phase9
            data/catalog/phase9_review_summary.json
            data/catalog/phase9_plan_history.json
            data/catalog/phase9_execution_queue.json
            data/catalog/phase9_completion.json
          retention-days: 14
      - name: Commit generated review data
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/reviewed/phase9 \
            data/evidence/phase9 \
            data/catalog/phase9_review_summary.json \
            data/catalog/phase9_plan_history.json \
            data/catalog/phase9_execution_queue.json \
            data/catalog/phase9_completion.json
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "Materialize Phase 9 reviewed target statements"
            git push
          fi
