name: Aichi Schema Materialize

on:
  push:
    branches:
      - agent/aichi-policy-indicators-complete
    paths:
      - .github/workflows/aichi_schema_materialize.yml

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/aichi-policy-indicators-complete
          fetch-depth: 0
      - name: Write exact Aichi schemas
        env:
          CATALOG_SCHEMA_GZ_B64: 
          EVIDENCE_SCHEMA_GZ_B64: 
          MANIFEST_SCHEMA_GZ_B64: 
        run: |
          python - <<'PY'
          import base64, gzip, os
          from pathlib import Path
          files = {
              "schemas/aichi_policy_indicators.schema.json": os.environ["CATALOG_SCHEMA_GZ_B64"],
              "schemas/aichi_policy_indicator_evidence.schema.json": os.environ["EVIDENCE_SCHEMA_GZ_B64"],
              "schemas/aichi_policy_indicator_review_manifest.schema.json": os.environ["MANIFEST_SCHEMA_GZ_B64"],
          }
          for path, payload in files.items():
              Path(path).write_bytes(gzip.decompress(base64.b64decode(payload)))
          PY
      - name: Remove temporary workflow and commit
        run: |
          rm .github/workflows/aichi_schema_materialize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add schemas/aichi_policy_indicators.schema.json schemas/aichi_policy_indicator_evidence.schema.json schemas/aichi_policy_indicator_review_manifest.schema.json
          git add -u .github/workflows/aichi_schema_materialize.yml
          git commit -m "Add exact Aichi schemas"
          git push origin HEAD:agent/aichi-policy-indicators-complete
