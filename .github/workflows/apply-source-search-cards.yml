name: Apply source search cards

on:
  push:
    branches:
      - agent/source-search-quality-ui
    paths:
      - .github/workflows/apply-source-search-cards.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/source-search-quality-ui
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/apply_source_search_cards.py
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: Expose manifesto source search quality metrics
          branch: agent/source-search-quality-ui
