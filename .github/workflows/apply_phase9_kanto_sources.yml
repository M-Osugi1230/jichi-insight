name: Apply Phase 9 Kanto Sources

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply_phase9_kanto_sources.yml
      - data/catalog/phase9_kanto_source_registry.json
      - scripts/apply_phase9_source_registry.py

permissions:
  contents: read

jobs:
  apply:
    if: github.head_ref == 'agent/phase9-kanto-source-index'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase9-kanto-source-index
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply Kanto source registry
        run: |
          python scripts/apply_phase9_source_registry.py \
            data/catalog/phase9_kanto_source_registry.json
      - name: Upload generated execution state
        uses: actions/upload-artifact@v4
        with:
          name: phase9-kanto-execution-state
          path: |
            data/catalog/phase9_execution_queue.json
            data/catalog/phase9_completion.json
          retention-days: 7
