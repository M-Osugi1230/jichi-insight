name: Tokyo Final Text Patches

on:
  pull_request:
    paths:
      - ".github/workflows/tokyo-final-text-patches.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Update nationwide and release checks
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              "apps/web/app/municipalities/page.tsx": [
                  (
                      '<div><span>13 / 東京都</span><StatusBadge label="一部Reviewed" tone="progress" /></div>',
                      '<div><span>13 / 東京都</span><StatusBadge label="目標カード全件Reviewed" tone="verified" /></div>',
                  ),
                  (
                      '<h3>60ページを索引し、子供分野から読む。</h3>',
                      '<h3>60ページ・304目標カードを読む。</h3>',
                  ),
                  (
                      '<div><dt>位置索引</dt><dd>{tokyoPolicyTargetStats.sourcePages}ページ</dd></div>',
                      '<div><dt>政策分野</dt><dd>{tokyoPolicyTargetStats.policyAreas}</dd></div>',
                  ),
                  (
                      '<div><dt>Reviewed系列</dt><dd>{tokyoPolicyTargetStats.reviewedSeries}</dd></div>',
                      '<div><dt>Evidence</dt><dd>{tokyoPolicyTargetStats.evidencePackets}</dd></div>',
                  ),
                  (
                      '<p>子供分野の値、期間、母集団、維持・下限条件をEvidence Packet付きで公開しています。</p>',
                      '<p>25政策分野・304目標カードをEvidence付きで公開。子供分野以外のグラフ点列と年度実績は別工程です。</p>',
                  ),
              ],
              "scripts/validate_static_export.py": [
                  (
                      '        "8目標・9系列",\n        "2 / 60ページをReviewed。",\n        "年度実績 未接続",\n        "政策評価 未判定",\n        "子供（Children）",\n        "取り決め有りと全体は母集団が異なる",\n        "次工程",\n        "02 子育て PDFページ3-4",',
                      '        "304目標カード",\n        "60 / 60ページの政策目標カードReviewedを完了。",\n        "25政策分野・304目標カードを横断検索。",\n        "子供分野以外のグラフ点列は未正規化",\n        "年度実績 未接続",\n        "政策評価 未判定",\n        "子供分野は、グラフ点列まで詳細Reviewed。",\n        "取り決め有りと全体は母集団が異なる",',
                  ),
              ],
              "scripts/check_production.sh": [
                  (
                      '  "8目標・9系列" \\\n  "2 / 60ページをReviewed。" \\\n  "年度実績 未接続" \\\n  "政策評価 未判定" \\\n  "02 子育て PDFページ3-4"',
                      '  "304目標カード" \\\n  "60 / 60ページの政策目標カードReviewedを完了。" \\\n  "25政策分野・304目標カードを横断検索。" \\\n  "子供分野以外のグラフ点列は未正規化" \\\n  "年度実績 未接続" \\\n  "政策評価 未判定"',
                  ),
                  (
                      "printf 'Phase 8 Tokyo partial Reviewed publication checks: PASS\\n' >> \"$REPORT\"",
                      "printf 'Phase 8 Tokyo complete target-card publication checks: PASS\\n' >> \"$REPORT\"",
                  ),
              ],
          }

          for filename, pairs in replacements.items():
              path = Path(filename)
              content = path.read_text(encoding="utf-8")
              for old, new in pairs:
                  if old not in content:
                      raise SystemExit(f"Missing expected text in {filename}: {old[:80]!r}")
                  content = content.replace(old, new, 1)
              path.write_text(content, encoding="utf-8")
          PY

      - name: Commit patches
        run: |
          set -euo pipefail
          rm -f .github/workflows/tokyo-final-text-patches.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Synchronize Tokyo completion publication checks"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
