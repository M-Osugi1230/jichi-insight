name: Osaka Catalog Materialize

on:
  push:
    branches:
      - agent/osaka-beyond-expo-indicators-complete
    paths:
      - .github/workflows/osaka_materialize.yml

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/osaka-beyond-expo-indicators-complete
          fetch-depth: 0
      - name: Write reviewed Osaka data
        env:
          CATALOG_GZ_B64: 
          EVIDENCE_GZ_B64: 
          MANIFEST_GZ_B64: 
          SOURCES_GZ_B64: 
        run: |
          python - <<'PY'
          import base64, gzip, os
          from pathlib import Path
          files = {
              "data/reviewed/osaka_beyond_expo_indicators.json": os.environ["CATALOG_GZ_B64"],
              "data/evidence/osaka_beyond_expo_indicator_evidence.json": os.environ["EVIDENCE_GZ_B64"],
              "data/catalog/osaka_beyond_expo_indicator_review_manifest.json": os.environ["MANIFEST_GZ_B64"],
              "data/catalog/osaka_policy_sources.json": os.environ["SOURCES_GZ_B64"],
          }
          for path, payload in files.items():
              target = Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(gzip.decompress(base64.b64decode(payload)))
          PY
      - name: Remove temporary workflow and commit
        run: |
          rm .github/workflows/osaka_materialize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/reviewed/osaka_beyond_expo_indicators.json
          git add data/evidence/osaka_beyond_expo_indicator_evidence.json data/catalog/osaka_beyond_expo_indicator_review_manifest.json data/catalog/osaka_policy_sources.json
          git add -u .github/workflows/osaka_materialize.yml
          git commit -m "Materialize reviewed Osaka indicators"
          git push origin HEAD:agent/osaka-beyond-expo-indicators-complete
