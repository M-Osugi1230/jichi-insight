name: Apply targets 13 to 15 with API

on:
  pull_request:
    branches:
      - main
    types:
      - reopened
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/fukuoka-targets-13-15'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_BRANCH: agent/fukuoka-targets-13-15
      TARGET_PATH: apps/web/lib/policyTargets.ts
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fukuoka-targets-13-15
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate registry
        run: python scripts/register_targets_13_15.py
      - name: Update registry through Contents API
        run: |
          current_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${TARGET_PATH}?ref=${TARGET_BRANCH}" --jq .sha)"
          encoded="$(base64 -w0 "${TARGET_PATH}")"
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${TARGET_PATH}" \
            -f message='Register target catalogs for initiatives 13 to 15' \
            -f content="${encoded}" \
            -f sha="${current_sha}" \
            -f branch="${TARGET_BRANCH}"
