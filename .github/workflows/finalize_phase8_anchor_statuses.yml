name: Finalize Phase 8 Anchor Statuses

on:
  push:
    branches:
      - agent/okinawa-midterm-indicator-review
    paths:
      - .github/workflows/finalize_phase8_anchor_statuses.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/okinawa-midterm-indicator-review
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Synchronize branch
        run: git pull --rebase origin agent/okinawa-midterm-indicator-review
      - name: Normalize completed anchors
        run: python scripts/finalize_phase8_anchor_statuses.py
      - name: Commit registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog/regional_anchor_source_registry.json
          git commit -m "Normalize completed Phase 8 anchor statuses"
          git push origin HEAD:agent/okinawa-midterm-indicator-review
