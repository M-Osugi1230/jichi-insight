name: Aichi Integration Patch

on:
  push:
    branches:
      - agent/aichi-policy-indicators-complete
    paths:
      - .github/workflows/aichi_integration_patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/aichi-policy-indicators-complete
          fetch-depth: 0
      - name: Apply integration patch
        env:
          PATCH_GZ_B64: 
        run: |
          python - <<'PY'
          import base64, gzip, os
          from pathlib import Path
          target = Path("scripts/_aichi_integration_patch.py")
          target.write_bytes(gzip.decompress(base64.b64decode(os.environ["PATCH_GZ_B64"])))
          PY
          python scripts/_aichi_integration_patch.py
      - name: Remove temporary files and commit
        run: |
          rm scripts/_aichi_integration_patch.py
          rm .github/workflows/aichi_integration_patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/reviewed/aichi_policy_indicators.json
          git add apps data docs scripts tests .github/workflows/aichi_integration_patch.yml
          git commit -m "Integrate reviewed Aichi indicators"
          git push origin HEAD:agent/aichi-policy-indicators-complete
