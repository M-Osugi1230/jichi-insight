name: Tokyo Completion Generator

on:
  pull_request:
    paths:
      - ".github/workflows/tokyo-completion-generator.yml"
      - "scripts/build_tokyo_policy_target_completion.py.gz.b64"

permissions:
  contents: write

jobs:
  generate:
    name: Generate complete Tokyo target-card review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install extraction dependency
        run: python -m pip install "PyMuPDF>=1.24,<2"

      - name: Download official Tokyo policy targets
        run: |
          set -euo pipefail
          mkdir -p .tmp/tokyo
          curl --fail --location --retry 4 --retry-delay 3 \
            "https://www.seisakukikaku.metro.tokyo.lg.jp/documents/d/seisakukikaku/2050tokyo-seisakumokuhyo2026" \
            --output .tmp/tokyo/tokyo-policy-targets-2026.pdf

      - name: Decode and run completion generator
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          encoded = Path("scripts/build_tokyo_policy_target_completion.py.gz.b64").read_bytes()
          Path(".tmp/tokyo/build_completion.py").write_bytes(
              gzip.decompress(base64.b64decode(encoded))
          )
          PY
          python .tmp/tokyo/build_completion.py \
            --pdf .tmp/tokyo/tokyo-policy-targets-2026.pdf \
            --repo-root .

      - name: Remove temporary generation files
        run: |
          rm -rf .tmp
          rm -f scripts/build_tokyo_policy_target_completion.py.gz.b64
          rm -f .github/workflows/tokyo-source-extract.yml
          rm -f .github/workflows/tokyo-completion-generator.yml

      - name: Commit generated completion data
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git commit -m "Complete Tokyo policy target card review"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
