name: Production Smoke

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_run:
    workflows:
      - Deploy Pages
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: production-smoke-${{ github.event.workflow_run.id || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Verify production
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'main' }}

      - name: Check current production availability
        if: github.event_name == 'pull_request'
        run: |
          status="$(curl --silent --show-error --location --output production-home.html --write-out '%{http_code}' https://m-osugi1230.github.io/jichi-insight/)"
          printf 'Jichi Insight pre-merge production availability\nHTTP %s\n' "$status" > production-smoke-report.txt
          test "$status" = "200"
          grep --quiet --fixed-strings 'Jichi Insight' production-home.html

      - name: Check deployed release content
        if: github.event_name != 'pull_request'
        run: bash scripts/check_production.sh

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-report
          path: production-smoke-report.txt
          if-no-files-found: error
          retention-days: 14
