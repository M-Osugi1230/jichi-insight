name: Bootstrap Miyagi measure 8

on:
  push:
    branches:
      - agent/miyagi-actuals-measure8

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/miyagi-actuals-measure8

      - name: Materialize reviewed measure 8 files
        run: |
          python scripts/bootstrap_measure8_01_actuals.py
          python scripts/bootstrap_measure8_02_evidence.py
          python scripts/bootstrap_measure8_03_rest.py

      - name: Commit reviewed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/entities/policy/miyagi_kpi_actuals_measure8_2024.json \
            data/entities/policy/miyagi_kpi_actuals_measure8_2024_evidence_packets.json \
            data/entities/policy/miyagi_kpi_catalog_measure8.json \
            apps/web/lib/miyagiActuals.ts \
            data/catalog/miyagi_policy_review_manifest.json \
            data/catalog/wave1_policy_review_queue.json \
            schemas/miyagi_policy_review_manifest.schema.json \
            tests/test_miyagi_catalog_totals.py \
            tests/test_wave1_policy_review_queue.py \
            tests/test_miyagi_kpi_actuals_measure8.py
          git commit -m "Link Miyagi measure 8 annual KPI results"
          git push origin HEAD:agent/miyagi-actuals-measure8
