name: Refinalize Phase 9 catalogs

on:
  push:
    branches:
      - agent/phase9-full-review
    paths:
      - .github/workflows/refinalize-phase9-catalogs.yml

permissions:
  contents: write

jobs:
  refinalize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase9-full-review
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install validation dependencies
        run: python -m pip install -e .[dev]
      - name: Rebuild canonical Phase 9 catalogs
        run: python scripts/finalize_phase9_publication.py
      - name: Validate corrected state
        run: |
          python scripts/validate_repository.py
          pytest \
            tests/test_all_reviewed_data.py \
            tests/test_nationwide_policy_review_queue.py \
            tests/test_nationwide_source_inventory.py \
            tests/test_prefecture_coverage.py \
            tests/test_phase9_reviewed_target_statements.py \
            tests/test_phase9_completion.py \
            tests/test_phase7_completion.py
      - name: Commit canonical catalog corrections
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog
          if git diff --cached --quiet; then
            echo "Canonical catalogs are already current"
            exit 0
          fi
          git commit -m "Reconcile nationwide Phase 9 catalog state"
          git push origin HEAD:agent/phase9-full-review
