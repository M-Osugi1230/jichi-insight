name: Kagawa Indicator Extraction

on:
  push:
    branches:
      - agent/kagawa-extended-plan-indicators
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/kagawa_extract.yml

permissions:
  contents: read

jobs:
  extract:
    if: github.head_ref == 'agent/kagawa-extended-plan-indicators' || github.ref_name == 'agent/kagawa-extended-plan-indicators'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/kagawa-extended-plan-indicators
      - name: Install PDF tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Download official Kagawa indicator revision PDF
        run: |
          mkdir -p data/raw
          curl --fail --location --retry 4 --output data/raw/kagawa_indicator_revision_2026.pdf \
            https://www.pref.kagawa.lg.jp/documents/36520/shiryou3_shihyouminaoshi.pdf
          test "$(stat -c%s data/raw/kagawa_indicator_revision_2026.pdf)" -gt 100000
      - name: Extract layout-preserving text
        run: |
          pdftotext -layout -nopgbrk data/raw/kagawa_indicator_revision_2026.pdf data/raw/kagawa_indicator_revision_2026.txt
          python - <<'PY'
          from pathlib import Path
          path = Path('data/raw/kagawa_indicator_revision_2026.txt')
          text = path.read_text(encoding='utf-8')
          assert '計画期間の延長及び指標の目標値等の見直しについて' in text
          assert '135' in text and '県人口' in text
          print(len(text), text.count('\n'))
          PY
      - name: Upload official PDF and extracted text
        uses: actions/upload-artifact@v4
        with:
          name: kagawa-indicator-revision-source
          path: |
            data/raw/kagawa_indicator_revision_2026.pdf
            data/raw/kagawa_indicator_revision_2026.txt
          retention-days: 7
