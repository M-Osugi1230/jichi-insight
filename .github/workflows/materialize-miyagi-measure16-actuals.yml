name: Materialize Miyagi measure 16 actuals

on:
  pull_request:
    paths:
      - .github/workflows/materialize-miyagi-measure16-actuals.yml
  push:
    branches:
      - agent/miyagi-actuals-measure16
    paths:
      - .github/workflows/materialize-miyagi-measure16-actuals.yml

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/miyagi-actuals-measure16
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install validation dependencies
        run: python -m pip install -e .[dev]
      - name: Apply measure 16 canonical state
        run: python scripts/apply_miyagi_measure16_actuals.py
      - name: Validate repository
        run: python scripts/validate_repository.py
      - name: Test measure 16 and aggregate state
        run: |
          pytest \
            tests/test_miyagi_kpi_actuals_measure16.py \
            tests/test_miyagi_catalog_totals.py \
            tests/test_wave1_policy_review_queue.py
      - name: Lint changed Python
        run: |
          ruff check \
            scripts/apply_miyagi_measure16_actuals.py \
            tests/test_miyagi_kpi_actuals_measure16.py \
            tests/test_miyagi_catalog_totals.py \
            tests/test_wave1_policy_review_queue.py
      - name: Commit canonical state
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/entities/policy/miyagi_kpi_catalog_measure16.json \
            data/catalog/miyagi_policy_review_manifest.json \
            data/catalog/wave1_policy_review_queue.json \
            apps/web/lib/miyagiActuals.ts \
            tests/test_miyagi_catalog_totals.py \
            tests/test_wave1_policy_review_queue.py
          if git diff --cached --quiet; then
            echo "Measure 16 canonical state is already current"
            exit 0
          fi
          git commit -m "Materialize Miyagi measure 16 actual linkage"
          git push origin HEAD:agent/miyagi-actuals-measure16
