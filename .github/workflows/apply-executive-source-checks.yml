name: Apply executive source checks

on:
  push:
    branches:
      - agent/executive-manifesto-sources
    paths:
      - .github/workflows/apply-executive-source-checks.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/executive-manifesto-sources

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply guarded updates
        run: python scripts/apply_executive_source_checks.py

      - name: Remove temporary automation
        run: |
          rm scripts/apply_executive_source_checks.py
          rm .github/workflows/apply-executive-source-checks.yml

      - name: Commit branch updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Integrate executive source checks"
          git push origin HEAD:agent/executive-manifesto-sources
