name: Materialize Phase 10 Wave 1 source state

on:
  pull_request:
    paths:
      - .github/workflows/materialize-phase10-wave1-source-state.yml
  push:
    branches:
      - agent/phase10-miyagi-fukuoka-source-inventory
    paths:
      - .github/workflows/materialize-phase10-wave1-source-state.yml

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase10-miyagi-fukuoka-source-inventory
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install validation dependencies
        run: python -m pip install -e .[dev]
      - name: Apply Wave 1 source inventory
        run: python scripts/apply_phase10_wave1_source_inventory.py
      - name: Validate repository
        run: python scripts/validate_repository.py
      - name: Test Phase 10 execution queue
        run: pytest tests/test_phase10_execution_queue.py
      - name: Test Wave 1 source inventory
        run: pytest tests/test_phase10_wave1_source_inventory.py
      - name: Test nationwide source inventory
        run: pytest tests/test_nationwide_source_inventory.py
      - name: Lint materialization code
        run: ruff check scripts/apply_phase10_wave1_source_inventory.py tests/test_phase10_wave1_source_inventory.py
      - name: Commit canonical state
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/catalog/nationwide_source_inventory.json \
            data/catalog/phase10_execution_queue.json \
            data/catalog/phase10_completion.json
          if git diff --cached --quiet; then
            echo "Canonical Phase 10 state is already current"
            exit 0
          fi
          git commit -m "Materialize Miyagi and Fukuoka Phase 10 source state"
          git push origin HEAD:agent/phase10-miyagi-fukuoka-source-inventory
